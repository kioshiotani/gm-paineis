<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM Painéis | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div class="container">
        <div class="row align-items-center justify-content-center vh-100">
            <form action="" class="col-12 col-sm-6 bg-light p-4 rounded shadow">
                <h4 class="text-center mb-4">Acesso ao Sistema</h4>
                <div class="input-group mb-3">
                    <span class="input-group-text" id="icone-usuario">
                        <i class="bi bi-person-fill"></i>
                    </span>
                    <input type="text" id="username" placeholder="Usuário" class="form-control" aria-label="Usuário">
                </div>
                <div class="input-group mb-4">
                    <span class="input-group-text" id="icone-senha">
                        <i class="bi bi-lock-fill"></i>
                    </span>
                    <input type="password" id="pass" placeholder="Senha" class="form-control" aria-label="Senha">
                 </div>
                <input type="submit" value="Entrar" id="loginBtn" class="btn btn-laranja w-100 rounded-pill fw-bold">
            </form>
        </div>
    </div>
</body>
</html>
