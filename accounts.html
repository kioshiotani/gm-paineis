    </div>

    <nav class="navbar navbar-expand-lg text-warning bg-black navbar-dark">
        <div class="container-fluid">
                <div class="d-flex align-items-center">
                    <button class="btn bg-transparent text-white fs-5" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuLateral" aria-controls="menuLateral">☰</button>

    <main>
        <div id="accounts" class="shadow mx-auto col-md-8 mt-5 p-5 mb-5">
            <div class="d-flex flex-row justify-content-between mb-2">
                <h1>Contas</h1>
                <button class="btn bg-success d-flex align-items-center justify-content-center" 
                        style="width: 3.5rem; height: 3.5rem; border-radius: 50%; padding: 0;"
                        data-bs-toggle="collapse" data-bs-target="#account_create" aria-expanded="false" aria-controls="account_create">
                <i class="bi bi-plus text-white" style="font-size: 2.5rem;"></i>
                </button>
            </div> 
            <div class="container-fluid bg-black" style="height: 1px"></div>
            <div class="collapse shadow my-5" id="account_create">
                <form class="p-5 border-top" id="account_create_form">
                    <div class="mb-3">
                        <label for="account_create_name" class="form-label">Nome de Usuário</label>
                        <input type="text" class="form-control" id="account_create_name">
                    </div>
                    <div class="mb-3">
                        <label for="account_create_password" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="account_create_password">
                    </div>
                    <button type="submit" class="btn text-white" style="background-color: #FF6B00">Criar conta</button>
                </form>
            </div>
            <div class="accounts-items">
                <div class="account-box my-5 shadow p-3">
                    <div class="d-flex flex-row justify-content-between">
                        <p class="account-bar-name overflow-hidden">Admin</p>
                        <div class="account-icons">
                            <i class="bi bi-pencil mx-2" role="button" style="cursor: pointer;" data-bs-toggle="collapse" data-bs-target="#account_edit_1" aria-expanded="false" aria-controls="account_edit_1"></i>

                        </div>
                    </div> 
                    <div class="collapse" id="account_edit_1">
                        <form class="p-3 border-top">
                            <div class="mb-3">
                                <label for="account_edit_1_name" class="form-label">Novo nome de usuário</label>
                                <input type="text" class="form-control" id="account_edit_1_name">
                            </div>
                            <div class="mb-3">
                                <label for="account_edit_1_password" class="form-label">Nova senha</label>
                                <input type="password" class="form-control" id="account_edit_1_password">
                            </div>
                            <button type="submit" class="btn text-white" style="background-color: #FF6B00">Atualizar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
